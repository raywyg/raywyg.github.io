<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raywyg Links</title>
    <style>
        body {
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 10vh;
        }
        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-color: #2a2a2a;
            margin-bottom: 20px;
        }
        .username {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .bio {
            font-size: 14px;
            color: #888;
            margin-bottom: 30px;
        }
        .link-btn {
            background-color: #1a1a1a;
            color: #fff;
            text-decoration: none;
            padding: 16px 32px;
            width: 280px;
            text-align: center;
            border-radius: 12px;
            margin-bottom: 16px;
            border: 1px solid #333;
            transition: all 0.3s ease;
        }
        .link-btn:hover {
            background-color: #fff;
            color: #000;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="profile-pic"></div>
    <div class="username">@raywyg</div>
    <div class="bio">Digital Creator | Projects & Links</div>

    <a href="#" class="link-btn">Telegram</a>
    <a href="#" class="link-btn">Портфолио</a>
    <a href="#" class="link-btn">Связь со мной</a>

</body>
</html>
