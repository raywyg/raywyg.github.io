<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raywyg | Links</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="icon" type="image/jpeg" href="avatar.jpg">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #f4f9ff;
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .bg-streams {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            background: 
                radial-gradient(circle at 15% 50%, rgba(173, 216, 230, 0.4) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(200, 225, 250, 0.5) 0%, transparent 40%);
            opacity: 0.8;
            filter: blur(40px);
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            width: 100vw; height: 100vh;
            padding: 5vw; gap: 20px;
        }

        .glass-card {
            grid-column: 1 / 2; grid-row: 1 / 2;
            align-self: center; justify-self: center;
            background: rgba(185, 220, 255, 0.25);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
            border-radius: 24px;
            padding: 30px;
            width: 100%; max-width: 350px;
            display: flex; align-items: center; gap: 20px;
        }

        .avatar-wrapper {
            position: relative; width: 80px; height: 80px; flex-shrink: 0;
        }
        .profile-pic {
            width: 100%; height: 100%; border-radius: 50%;
            object-fit: cover; border: 2px solid rgba(255, 255, 255, 0.8);
            user-select: none; -webkit-user-drag: none;
        }
        .anti-copy-shield {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%; z-index: 10;
        }
        .text-info h1 {
            font-size: 24px; font-weight: 500; color: #111;
            margin-bottom: 4px; letter-spacing: 0.5px;
        }
        .refraction-zone {
            position: relative; display: inline-block; padding: 5px 10px; margin-left: -10px;
        }
        .role-text {
            font-size: 15px; color: #555; font-weight: 300;
            position: relative; z-index: 1; letter-spacing: 0.5px;
        }

        .mini-bubble {
            position: absolute; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.5) 0%, rgba(255, 255, 255, 0) 60%);
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.8), 0 4px 12px rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(5px) brightness(1.1); -webkit-backdrop-filter: blur(5px) brightness(1.1);
            z-index: 2; pointer-events: none;
        }
        .mb-1 { width: 50px; height: 50px; top: -15px; left: -5px; animation: float-lens-1 7s infinite ease-in-out alternate; }
        .mb-2 { width: 35px; height: 35px; bottom: -10px; right: 5px; animation: float-lens-2 6s infinite ease-in-out alternate-reverse; }

        @keyframes float-lens-1 { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(60px, 10px) scale(1.1); } }
        @keyframes float-lens-2 { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(-50px, -15px) scale(1.15); } }

        .bubble-wrapper-ig { grid-column: 2 / 3; grid-row: 1 / 2; align-self: center; justify-self: center; }
        .bubble-wrapper-tt { grid-column: 1 / 2; grid-row: 2 / 3; align-self: center; justify-self: center; }
        .copyright-mark {
            position: fixed;
            bottom: 20px;
            right: 30px;
            font-size: 11px;
            color: #888;
            font-weight: 300;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            user-select: none;
            pointer-events: none;
            z-index: 100;
        }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; grid-template-rows: auto auto auto; height: auto; min-height: 100vh; padding-top: 10vh; padding-bottom: 80px; }
            .glass-card { grid-column: 1; grid-row: 1; }
            .bubble-wrapper-ig { grid-column: 1; grid-row: 2; margin-top: 40px; }
            .bubble-wrapper-tt { grid-column: 1; grid-row: 3; margin-top: 20px; }
            .copyright-mark {
                position: absolute;
                bottom: 20px;
                right: 0; left: 0;
                text-align: center;
            }
        }

.soap-bubble {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            width: 220px;
            height: 220px;
            position: relative;
            cursor: pointer;
            transition: transform 0.4s ease;
            user-select: none;
        }

        .btn-text {
            position: relative;
            z-index: 10; 
            color: #1a3a5f;
            font-size: 19px;
            font-weight: 500;
            letter-spacing: 0.5px;
            pointer-events: none;
            transition: transform 0.3s ease;
        }

        .bg-logo {
            position: absolute;
            font-size: 110px; 
            color: rgba(26, 58, 95, 0.06); 
            z-index: 0; 
            filter: blur(2px); 
            transform: scale(1);
            transition: all 0.5s ease;
            pointer-events: none;
        }

        .soap-bubble::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            filter: url('#fractal-warp');
            
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.9) 0%, rgba(255, 255, 255, 0.1) 15%, rgba(173, 216, 230, 0.25) 60%, rgba(255, 192, 203, 0.2) 80%, rgba(173, 216, 230, 0.5) 100%);
            
            box-shadow: 
                inset 0 20px 30px rgba(255, 255, 255, 0.7),
                inset 10px -10px 20px rgba(173, 216, 230, 0.3),
                inset -10px 10px 20px rgba(255, 192, 203, 0.3),
                0 15px 35px rgba(173, 216, 230, 0.15);
                
            animation: morph-bubble 8s ease-in-out infinite;
            z-index: 1;
        }

        .bubble-wrapper-tt .soap-bubble {
            width: 200px;
            height: 200px;
        }

        .bubble-wrapper-tt .soap-bubble::before {
            background: radial-gradient(circle at 35% 35%, rgba(255, 255, 255, 0.9) 0%, rgba(255, 255, 255, 0.1) 20%, rgba(200, 225, 250, 0.25) 60%, rgba(230, 190, 255, 0.2) 80%, rgba(173, 216, 230, 0.4) 100%);
            animation: morph-bubble-alt 10s ease-in-out infinite;
        }

        .soap-bubble:hover {
            transform: scale(1.05) translateY(-5px);
        }

        .soap-bubble:hover .bg-logo {
            transform: scale(1.2) rotate(-15deg);
            color: rgba(26, 58, 95, 0.12); 
            filter: blur(4px); 
        }

        .soap-bubble:hover .btn-text {
            transform: scale(1.05);
        }

        .soap-bubble:active {
            transform: scale(0.95);
        }

        @keyframes morph-bubble {
            0%, 100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
            50% { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
        }

        @keyframes morph-bubble-alt {
            0%, 100% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
            50% { border-radius: 70% 30% 40% 60% / 60% 40% 50% 40%; }
        }
        
    </style>
</head>
<body>

    <svg style="position: absolute; width: 0; height: 0;" aria-hidden="true">
        <filter id="fractal-warp">
            <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="2" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="20" xChannelSelector="R" yChannelSelector="G" />
        </filter>
    </svg>

    <div class="bg-streams"></div>

    <div class="container">
        
        <div class="glass-card">
            <div class="avatar-wrapper">
                <div class="anti-copy-shield" oncontextmenu="return false;"></div>
                <img src="avatar.jpg" alt="Raywyg" class="profile-pic" draggable="false">
            </div>
            <div class="text-info">
                <h1>@raywyg</h1>
                <div class="refraction-zone">
                    <p class="role-text">graphic designer</p>
                    <div class="mini-bubble mb-1"></div>
                    <div class="mini-bubble mb-2"></div>
                </div>
            </div>
        </div>

        <div class="bubble-wrapper-ig">
            <a href="https://www.instagram.com/raywygxio/" target="_blank" class="soap-bubble">
                <i class="fa-brands fa-instagram bg-logo"></i>
                <span class="btn-text">my ig</span>
            </a>
        </div>

        <div class="bubble-wrapper-tt">
            <a href="https://www.tiktok.com/@raywyg?_r=1&_t=ZN-97g7VsXeEVC" target="_blank" class="soap-bubble">
                <i class="fa-brands fa-tiktok bg-logo"></i>
                <span class="btn-text">my tiktok</span>
            </a>
        </div>

    </div>
    <div class="copyright-mark">
        &copy; 2026 RAYWYG. All rights reserved.
    </div>

</body>
</html>
