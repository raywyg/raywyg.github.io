<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raywyg | Links</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    
    <link rel="icon" type="image/jpeg" href="avatar.jpg">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f4f9ff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .bg-streams {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: 
                radial-gradient(circle at 15% 50%, rgba(173, 216, 230, 0.4) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(200, 225, 250, 0.5) 0%, transparent 40%);
            opacity: 0.8;
            filter: blur(40px);
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            width: 100vw;
            height: 100vh;
            padding: 5vw;
            gap: 20px;
        }

        .glass-card {
            grid-column: 1 / 2;
            grid-row: 1 / 2;
            align-self: center;
            justify-self: center;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            border-radius: 24px;
            padding: 30px;
            width: 100%;
            max-width: 350px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .avatar-wrapper {
            position: relative;
            width: 80px;
            height: 80px;
            flex-shrink: 0;
        }

        .profile-pic {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.8);
            user-select: none;
            -webkit-user-drag: none;
        }

        .anti-copy-shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            z-index: 10;
        }

        .text-info h1 {
            font-size: 22px;
            font-weight: 500;
            color: #111;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .text-info p {
            font-size: 13px;
            color: #555;
            font-weight: 300;
        }
        .bubble-wrapper-ig {
            grid-column: 2 / 3;
            grid-row: 1 / 2;
            align-self: center;
            justify-self: center;
        }

        .bubble-wrapper-tt {
            grid-column: 1 / 2;
            grid-row: 2 / 3;
            align-self: center;
            justify-self: center;
        }
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto auto;
                height: auto;
                min-height: 100vh;
                padding-top: 10vh;
            }
            .glass-card {
                grid-column: 1; grid-row: 1;
            }
            .bubble-wrapper-ig {
                grid-column: 1; grid-row: 2;
                margin-top: 40px;
            }
            .bubble-wrapper-tt {
                grid-column: 1; grid-row: 3;
                margin-top: 20px;
            }
        }

       .soap-bubble {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #1a3a5f; 
            font-size: 18px;
            font-weight: 400;
            letter-spacing: 0.5px;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.9) 0%, rgba(255, 255, 255, 0.1) 20%, rgba(173, 216, 230, 0.15) 60%, rgba(255, 192, 203, 0.15) 80%, rgba(173, 216, 230, 0.4) 100%);
            
            box-shadow: 
                inset 0 20px 30px rgba(255, 255, 255, 0.7),
                inset 10px -10px 20px rgba(173, 216, 230, 0.3),
                inset -10px 10px 20px rgba(255, 192, 203, 0.3),
                0 15px 35px rgba(173, 216, 230, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.6);
            position: relative;
            cursor: pointer;
            animation: 
                bubble-float 6s ease-in-out infinite,
                bubble-wobble 4s ease-in-out infinite;
                
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.5s ease;
            user-select: none;
        }

        .soap-bubble::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 35px;
            width: 45px;
            height: 20px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            transform: rotate(-15px);
            filter: blur(1px);
        }

        .bubble-wrapper-tt .soap-bubble {
            animation-delay: -2.5s;
            width: 170px; 
            height: 170px;
            background: radial-gradient(circle at 35% 35%, rgba(255, 255, 255, 0.9) 0%, rgba(255, 255, 255, 0.1) 20%, rgba(200, 225, 250, 0.2) 60%, rgba(230, 190, 255, 0.15) 80%, rgba(173, 216, 230, 0.4) 100%);
        }

        .soap-bubble:hover {
            transform: scale(1.1) translateY(-5px);
            box-shadow: 
                inset 0 20px 40px rgba(255, 255, 255, 0.9),
                inset 15px -15px 30px rgba(173, 216, 230, 0.4),
                0 20px 40px rgba(173, 216, 230, 0.35);
        }

        .soap-bubble:active {
            transform: scale(0.95);
        }

        @keyframes bubble-float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-15px);
            }
        }

        @keyframes bubble-wobble {
            0%, 100% {
                border-radius: 50% 50% 50% 50%;
            }
            25% {
                border-radius: 48% 52% 49% 51%;
            }
            50% {
                border-radius: 52% 48% 51% 49%;
            }
            75% {
                border-radius: 49% 51% 52% 48%;
            }
        }
    </style>
</head>
<body>

    <div class="bg-streams"></div>

    <div class="container">
        
        <div class="glass-card">
            <div class="avatar-wrapper">
                <div class="anti-copy-shield" oncontextmenu="return false;"></div>
                <img src="avatar.jpg" alt="Raywyg" class="profile-pic" draggable="false">
            </div>
            <div class="text-info">
                <h1>@raywyg</h1>
                <p>Digital Creator</p>
            </div>
        </div>

        <div class="bubble-wrapper-ig">
            <a href="https://www.instagram.com/raywygxio/" target="_blank" class="soap-bubble">my ig</a>
        </div>

        <div class="bubble-wrapper-tt">
            <a href="https://www.tiktok.com/@raywyg?_r=1&_t=ZN-97g7VsXeEVC" target="_blank" class="soap-bubble">my tiktok</a>
        </div>

    </div>

</body>
</html>
